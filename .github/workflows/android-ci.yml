# ES: CI de Android — compila, corre lint y tests unitarios en cada PR y push.
#     No necesita secretos: el google-services.json del repo y los valores vacíos
#     de BTCPay en BuildConfig bastan para compilar.
# EN: Android CI — builds, lints and unit-tests every PR and push.
#     Needs no secrets: the repo's google-services.json and empty BTCPay
#     BuildConfig values are enough to compile.
name: Android CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build, lint & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      # ES: Lint es informativo por ahora (no bloquea el PR) — cuando la base de
      #     código esté limpia, quitar continue-on-error para hacerlo obligatorio.
      # EN: Lint is informational for now (doesn't block the PR) — once the
      #     codebase is clean, remove continue-on-error to make it mandatory.
      - name: Android Lint
        continue-on-error: true
        run: ./gradlew lintDebug --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
