name: Sync Translations

on:
  push:
    paths:
      - 'app/src/main/res/values/strings.xml'
    branches:
      - main
      - dev
  pull_request:
    paths:
      - 'app/src/main/res/values/strings.xml'

jobs:
  translate:
    name: Auto-translate missing strings
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch the branch so we can push back to it
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run translation sync
        run: python scripts/sync_strings.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet app/src/main/res/values-*/strings.xml \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true"  >> $GITHUB_OUTPUT

      - name: Commit translated strings
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/res/values-*/strings.xml
          git commit -m "chore: auto-translate missing strings [skip ci]"
          git push
